<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- TODO: Replace with a historical map / collage hero image -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#E8DFCD"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#B87E5A" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
    <pattern id="finegrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#6B8E5A" stroke-opacity="0.08" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#finegrid)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <!-- Faux map roads / blocks -->
  <g stroke="#3D5A3D" stroke-opacity="0.35" fill="none" stroke-width="2">
    <path d="M 0 220 Q 400 200 800 240 T 1600 260"/>
    <path d="M 0 460 Q 500 440 900 480 T 1600 500"/>
    <path d="M 0 680 Q 350 660 700 700 T 1600 720"/>
    <path d="M 220 0 Q 240 300 200 600 T 240 900"/>
    <path d="M 720 0 Q 740 300 700 600 T 740 900"/>
    <path d="M 1180 0 Q 1200 300 1160 600 T 1200 900"/>
  </g>
  <!-- Block polygons -->
  <g fill="#B87E5A" fill-opacity="0.12" stroke="#B87E5A" stroke-opacity="0.3" stroke-width="1">
    <rect x="260" y="260" width="120" height="80"/>
    <rect x="400" y="290" width="100" height="60"/>
    <rect x="540" y="270" width="140" height="100"/>
    <rect x="780" y="500" width="120" height="80"/>
    <rect x="940" y="520" width="100" height="60"/>
    <rect x="1080" y="500" width="140" height="100"/>
    <rect x="260" y="720" width="120" height="80"/>
    <rect x="400" y="730" width="100" height="60"/>
  </g>
  <text x="800" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#8B8579" font-style="italic">Hero placeholder — historical map collage to come</text>
</svg>
