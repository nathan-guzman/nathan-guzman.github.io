  <path d="M 80 420 Q 300 380 520 420 T 760 410" stroke="#3D5A3D" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Bird silhouette -->
  <g fill="#6B8E5A">
    <ellipse cx="380" cy="320" rx="70" ry="45"/>
    <circle cx="450" cy="290" r="28"/>
    <path d="M 470 282 L 510 286 L 470 296 Z" fill="#B87E5A"/>
    <circle cx="458" cy="284" r="3" fill="#1F1F1D"/>
    <!-- Wing -->
    <path d="M 360 305 Q 400 270 430 310 Q 400 330 360 305 Z" fill="#3D5A3D"/>
    <!-- Tail -->
    <path d="M 310 325 L 270 310 L 280 340 Z"/>
    <!-- Legs -->
    <line x1="370" y1="365" x2="370" y2="395" stroke="#3D5A3D" stroke-width="2"/>
    <line x1="400" y1="365" x2="400" y2="395" stroke="#3D5A3D" stroke-width="2"/>
  </g>
  <!-- Leaves -->
  <g fill="#6B8E5A" fill-opacity="0.55">
    <ellipse cx="180" cy="400" rx="14" ry="6" transform="rotate(-30 180 400)"/>
    <ellipse cx="600" cy="395" rx="14" ry="6" transform="rotate(20 600 395)"/>
    <ellipse cx="700" cy="395" rx="14" ry="6" transform="rotate(-15 700 395)"/>
  </g>
  <text x="400" y="560" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8B8579" font-style="italic">Backyard Bird Tracker — tile placeholder</text>
</svg>
